<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Notification App - Design System</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="app-container">
    <!-- NAVIGATION BAR -->
    <header class="navbar">
      <a href="/" class="navbar-logo">JobApp</a>

      <!-- Desktop Nav -->
      <nav class="desktop-nav">
        <a href="/dashboard" class="nav-link">Dashboard</a>
        <a href="/saved" class="nav-link">Saved</a>
        <a href="/digest" class="nav-link">Digest</a>
        <a href="/settings" class="nav-link">Settings</a>
        <a href="/proof" class="nav-link">Proof</a>
      </nav>

      <!-- Mobile Hamburger Button -->
      <button class="menu-toggle" aria-label="Toggle menu" id="mobile-menu-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </header>

    <!-- Mobile Navigation Panel -->
    <nav class="mobile-nav" id="mobile-nav">
      <a href="/dashboard" class="mobile-nav-link">Dashboard</a>
      <a href="/saved" class="mobile-nav-link">Saved</a>
      <a href="/digest" class="mobile-nav-link">Digest</a>
      <a href="/settings" class="mobile-nav-link">Settings</a>
      <a href="/proof" class="mobile-nav-link">Proof</a>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <div class="workspace-layout">
        <section class="primary-workspace" id="router-view">
          <!-- Router content injected here -->
        </section>
      </div>
    </main>

  </div>

  <script src="app.js"></script>
</body>

</html>
